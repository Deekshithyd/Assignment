<!DOCTYPE html>
<html>
<head>
<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f0f0f0;
}

.form-box {
    background: white;
    padding: 20px;
    width: 300px;
    border-radius: 10px;
}

input {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
}

input:focus {
    border: 2px solid blue;
}

button {
    width: 100%;
    padding: 10px;
    background: green;
    color: white;
}

button:hover {
    background: black;
}
</style>
</head>
<body>

<div class="form-box">
<h2>Register</h2>

<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<input type="password" placeholder="Confirm Password">

<button>Submit</button>
</div>

</body>
</html>
