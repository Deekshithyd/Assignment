<!DOCTYPE html>
<html>
<head>
<style>
table {
    width: 100%;
}

tr:nth-child(even) {
    background: lightgray;
}

tr:hover {
    background: yellow;
}
</style>
</head>
<body>

<table border="1">
<tr><th>Name</th><th>Marks</th></tr>
<tr><td>A</td><td>80</td></tr>
<tr><td>B</td><td>85</td></tr>
<tr><td>C</td><td>90</td></tr>
<tr><td>D</td><td>75</td></tr>
<tr><td>E</td><td>88</td></tr>
<tr><td>F</td><td>92</td></tr>
</table>

</body>
</html>
