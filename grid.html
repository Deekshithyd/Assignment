<!DOCTYPE html>
<html>
<head>
<style>
.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.card {
    border: 1px solid black;
    padding: 10px;
    text-align: center;
}

.card:hover {
    background: lightgray;
}
</style>
</head>
<body>

<div class="container">

<div class="card">Product 1 ₹100</div>
<div class="card">Product 2 ₹200</div>
<div class="card">Product 3 ₹300</div>
<div class="card">Product 4 ₹400</div>
<div class="card">Product 5 ₹500</div>
<div class="card">Product 6 ₹600</div>

</div>

</body>
</html>
